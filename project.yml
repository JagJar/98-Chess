name: Chess98
options:
  bundleIdPrefix: com.vibrolo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: false
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  ChessKit:
    url: https://github.com/chesskit-app/chesskit-swift
    from: "0.17.0"
  ChessKitEngine:
    url: https://github.com/chesskit-app/chesskit-engine
    from: "0.6.0"

targets:
  Chess98:
    type: application
    platform: iOS
    sources:
      - path: Chess98
    dependencies:
      - package: ChessKit
      - package: ChessKitEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibrolo.chess98
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "Chess 98"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  Chess98Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Chess98Tests
    dependencies:
      - target: Chess98
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.vibrolo.chess98.tests

schemes:
  Chess98:
    build:
      targets:
        Chess98: all
        Chess98Tests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - Chess98Tests
    archive:
      config: Release
